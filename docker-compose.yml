services:
  # ── Основной бот ────────────────────────────────────────────────────────
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis, os; r = redis.Redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379')); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Парсер каналов TEQUILA / FULLMOON (v1.1) ────────────────────────────
  # Pyrogram userbot — мониторит каналы и добавляет треки в базу
  # parser:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.worker
  #   restart: unless-stopped
  #   env_file: .env
  #   command: python -m parser.channel_parser
  #   volumes:
  #     - ./data:/app/data
  #     - ./sessions:/app/sessions
  #     - ./logs:/app/logs
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  # ── Стример Voice Chat (v1.1) ───────────────────────────────────────────
  # Pyrogram + pytgcalls — стримит 24/7 в BLACK ROOM NIGHT CHAT
  # streamer:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.worker
  #   restart: unless-stopped
  #   env_file: .env
  #   command: python -m streamer.voice_chat
  #   volumes:
  #     - ./data:/app/data
  #     - ./downloads:/app/downloads
  #     - ./sessions:/app/sessions
  #     - ./logs:/app/logs
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy

  # ── TMA Player WebApp (1.1) ────────────────────────────────────────────
  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Dispatcher Bot (5.2) ─────────────────────────────────────────────
  # dispatcher:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dispatcher
  #   restart: unless-stopped
  #   env_file: .env
  #   depends_on:
  #     redis:
  #       condition: service_healthy

  # ── Node Bot 2 (5.2 — scale horizontally) ────────────────────────────
  # bot-node2:
  #   build: .
  #   restart: unless-stopped
  #   env_file: .env.node2
