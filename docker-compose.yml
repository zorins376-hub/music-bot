  #     redis:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy

  # ── Redis (VPS-optimized) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 1024mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 300
      --timeout 0
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL (VPS-optimized) ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-musicbot}
      POSTGRES_USER: ${POSTGRES_USER:-musicbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c maintenance_work_mem=128MB
      -c work_mem=16MB
      -c max_connections=100
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-musicbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── nginx + SSL (webhook-режим) ──────────────────────────────────────────
