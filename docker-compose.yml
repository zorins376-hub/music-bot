services:
  # ── Основной бот + TMA webapp (VPS-optimized) ──────────────────────────
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"   # TMA webapp
      - "9090:9090"   # Prometheus metrics
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import redis, os; r = redis.Redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379')); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3

