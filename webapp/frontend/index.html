<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7c4dff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>BLACK ROOM Player</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    button, a, [role="button"] {
      outline: none;
      cursor: pointer;
    }
    img { content-visibility: auto; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #eee);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    /* Smooth scrolling everywhere */
    *, *::before, *::after {
      scroll-behavior: smooth;
    }
    /* GPU-accelerated scrollable containers */
    [style*="overflow"] {
      -webkit-overflow-scrolling: touch;
      will-change: scroll-position;
    }
    /* Hide scrollbars but keep scrolling */
    ::-webkit-scrollbar { width: 0; height: 0; display: none; }
    /* Reduce backdrop-filter cost in scrolling lists */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes meshRotate {
      0%, 100% { filter: blur(60px) brightness(0.5); transform: scale(1.1) rotate(0deg); }
      33% { filter: blur(65px) brightness(0.45); transform: scale(1.15) rotate(2deg); }
      66% { filter: blur(55px) brightness(0.5); transform: scale(1.1) rotate(-2deg); }
    }
    @keyframes luxuryShine {
      0% { transform: translateX(-140%) skewX(-18deg); opacity: 0; }
      20% { opacity: 0.1; }
      50% { opacity: 0.32; }
      100% { transform: translateX(220%) skewX(-18deg); opacity: 0; }
    }
    @keyframes tequilaLogoReveal {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.84); filter: blur(10px); }
      18% { opacity: 0.92; transform: translate(-50%, -50%) scale(1); filter: blur(0px); }
      58% { opacity: 0.86; transform: translate(-50%, -50%) scale(1.02); filter: blur(0px); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.08); filter: blur(8px); }
    }
    @keyframes tequilaLogoHalo {
      0%, 100% { opacity: 0.18; transform: translate(-50%, -50%) scale(0.92); }
      50% { opacity: 0.34; transform: translate(-50%, -50%) scale(1.06); }
    }
    @keyframes tequilaLoaderPulse {
      0%, 100% { opacity: 0.45; transform: scale(1); }
      50% { opacity: 0.82; transform: scale(1.08); }
    }
    @keyframes tequilaGoldSweep {
      0% { background-position: 0% 50%; filter: brightness(0.95); }
      50% { background-position: 100% 50%; filter: brightness(1.14); }
      100% { background-position: 0% 50%; filter: brightness(0.95); }
    }
    @keyframes tequilaSparkleDrift {
      0% { transform: translate3d(0, 14px, 0) scale(0.7); opacity: 0; }
      18% { opacity: 0.9; }
      100% { transform: translate3d(0, -26px, 0) scale(1.08); opacity: 0; }
    }
    @keyframes tequilaFogDrift {
      0% { transform: translate3d(-5%, 0, 0) scale(1); opacity: 0.12; }
      50% { transform: translate3d(4%, -2%, 0) scale(1.08); opacity: 0.24; }
      100% { transform: translate3d(10%, -4%, 0) scale(1.14); opacity: 0.08; }
    }
    @keyframes tequilaFinalFlash {
      0%, 72%, 100% { opacity: 0; }
      78% { opacity: 0.08; }
      86% { opacity: 0.34; }
      92% { opacity: 0.16; }
    }
    @keyframes tequilaLoaderExit {
      0% { opacity: 1; transform: scale(1); filter: blur(0px); }
      100% { opacity: 0; transform: scale(1.035); filter: blur(8px); }
    }
    .luxury-carousel::-webkit-scrollbar { display: none; }
    .luxury-tab::after,
    .luxury-theme-chip::after {
      content: "";
      position: absolute;
      inset: -20% auto -20% -35%;
      width: 38%;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: translateX(-140%) skewX(-18deg);
      opacity: 0;
    }
    .luxury-tab.is-active::after,
    .luxury-tab.is-party::after,
    .luxury-theme-chip::after {
      animation: luxuryShine 3.2s ease-in-out infinite;
    }
    .luxury-tab.is-party {
      box-shadow: 0 8px 22px rgba(255, 122, 0, 0.18), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .boot-loader {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      transition: opacity 820ms ease, visibility 820ms ease;
      overflow: hidden;
    }
    .boot-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .boot-loader.is-exiting {
      animation: tequilaLoaderExit 900ms cubic-bezier(.22,.8,.24,1) forwards;
    }
    .boot-loader::before,
    .boot-loader::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(26px);
      animation: tequilaLoaderPulse 4.2s ease-in-out infinite;
      z-index: 1;
    }
    .boot-loader::before {
      width: 220px;
      height: 220px;
      background: rgba(124, 77, 255, 0.20);
      top: 10%;
      left: -40px;
    }
    .boot-loader::after {
      width: 260px;
      height: 260px;
      background: rgba(160, 107, 255, 0.14);
      right: -60px;
      bottom: 8%;
      animation-delay: 1.1s;
    }
    .boot-loader-card {
      position: relative;
      width: 100vw;
      height: 100vh;
      text-align: center;
    }
    .boot-loader-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(160, 107, 255, 0.14) 0.7px, transparent 0.7px),
        radial-gradient(rgba(124, 77, 255, 0.10) 0.7px, transparent 0.7px);
      background-position: 0 0, 14px 14px;
      background-size: 28px 28px;
      mix-blend-mode: soft-light;
      opacity: 0.18;
      pointer-events: none;
      z-index: 1;
    }
    .boot-loader-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 38%, rgba(180, 150, 255, 0.30), rgba(124, 77, 255, 0.12) 18%, rgba(255,255,255,0) 44%),
        linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(124, 77, 255, 0.06) 66%, rgba(160, 107, 255, 0.12) 100%);
      mix-blend-mode: screen;
      opacity: 0;
      pointer-events: none;
      animation: tequilaFinalFlash 4.2s ease-out infinite;
      z-index: 2;
    }
    .boot-loader-fog {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }
    .boot-loader-fog span {
      position: absolute;
      inset: auto;
      border-radius: 999px;
      filter: blur(32px);
      background: radial-gradient(circle, rgba(160, 107, 255, 0.20) 0%, rgba(124, 77, 255, 0.10) 42%, rgba(10, 10, 15, 0) 72%);
      animation: tequilaFogDrift 6.8s ease-in-out infinite;
      mix-blend-mode: screen;
    }
    .boot-loader-fog .fog-1 {
      width: 54vw;
      height: 26vw;
      left: -10vw;
      bottom: 8vh;
      animation-duration: 7.8s;
    }
    .boot-loader-fog .fog-2 {
      width: 46vw;
      height: 20vw;
      right: -8vw;
      top: 18vh;
      opacity: 0.16;
      animation-delay: 1.2s;
      animation-duration: 6.4s;
    }
    .boot-loader-fog .fog-3 {
      width: 32vw;
      height: 16vw;
      left: 34vw;
      bottom: 24vh;
      opacity: 0.14;
      animation-delay: 2.1s;
      animation-duration: 7.1s;
    }
    .boot-loader-caption {
      position: absolute;
      left: 50%;
      bottom: max(58px, calc(env(safe-area-inset-bottom) + 28px));
      transform: translateX(-50%);
      width: min(92vw, 600px);
      padding: 0 12px;
      font-size: clamp(10px, 3.2vw, 18px);
      line-height: 1.35;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: normal;
      word-break: keep-all;
      text-align: center;
      background: linear-gradient(90deg, #fff, #b47cff, #7c4dff, #fff);
      background-size: 220% 220%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(124, 77, 255, 0.22);
      animation: tequilaGoldSweep 4.6s linear infinite;
      z-index: 3;
    }
    .boot-loader-caption .spark {
      color: rgba(180, 150, 255, 0.95);
      text-shadow: 0 0 12px rgba(124, 77, 255, 0.4);
    }
    .boot-loader-subline {
      position: absolute;
      left: 50%;
      bottom: max(24px, calc(env(safe-area-inset-bottom) * 0.65));
      transform: translateX(-50%);
      width: min(96vw, 980px);
      font-size: 11px;
      letter-spacing: 0.46em;
      text-transform: uppercase;
      color: rgba(200, 190, 230, 0.5);
      z-index: 3;
    }
    .boot-loader-logo {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(26vw, 128px);
      transform: translate(-50%, -50%);
      opacity: 0;
      z-index: 3;
      filter: drop-shadow(0 0 24px rgba(124, 77, 255, 0.30));
      animation: tequilaLogoReveal 1.6s cubic-bezier(.22,.8,.24,1) forwards;
    }
    .boot-loader-logo::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 160%;
      height: 160%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(124, 77, 255, 0.30), transparent 62%);
      transform: translate(-50%, -50%);
      animation: tequilaLogoHalo 1.8s ease-in-out infinite;
      z-index: -1;
    }
    .boot-loader-logo img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0.92;
    }
    .boot-loader-sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .boot-loader-sparkle {
      position: absolute;
      color: rgba(180, 150, 255, 0.9);
      font-size: 16px;
      text-shadow: 0 0 16px rgba(124, 77, 255, 0.48);
      animation: tequilaSparkleDrift 2.8s ease-in-out infinite;
    }
    .boot-loader-sparkle.s1 { left: 16%; top: 18%; animation-delay: 0s; }
    .boot-loader-sparkle.s2 { right: 18%; top: 22%; animation-delay: .45s; }
    .boot-loader-sparkle.s3 { left: 20%; bottom: 28%; animation-delay: .9s; }
    .boot-loader-sparkle.s4 { right: 22%; bottom: 24%; animation-delay: 1.35s; }
    .boot-loader-sparkle.s5 { left: 49%; top: 10%; animation-delay: 1.8s; }
    .boot-loader-sparkle.s6 { left: 52%; bottom: 12%; animation-delay: 2.2s; }
  </style>
</head>
<body>
  <div id="boot-loader" class="boot-loader" aria-hidden="true">
    <div class="boot-loader-card">
      <div class="boot-loader-logo"><img src="/icon.svg" alt="Logo" /></div>
      <div class="boot-loader-fog" aria-hidden="true">
        <span class="fog-1"></span>
        <span class="fog-2"></span>
        <span class="fog-3"></span>
      </div>
      <div class="boot-loader-sparkles">
        <span class="boot-loader-sparkle s1">✦</span>
        <span class="boot-loader-sparkle s2">✦</span>
        <span class="boot-loader-sparkle s3">✦</span>
        <span class="boot-loader-sparkle s4">✦</span>
        <span class="boot-loader-sparkle s5">✦</span>
        <span class="boot-loader-sparkle s6">✦</span>
      </div>
      <div class="boot-loader-caption">BLACK ROOM</div>
      <div class="boot-loader-subline">музыка без границ</div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
