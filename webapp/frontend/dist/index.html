<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7c4dff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>BLACK ROOM Player</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }
    button {
      outline: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #eee);
      min-height: 100vh;
      overflow-x: hidden;
    }
    @keyframes meshRotate {
      0%, 100% { filter: blur(60px) brightness(0.5); transform: scale(1.1) rotate(0deg); }
      33% { filter: blur(65px) brightness(0.45); transform: scale(1.15) rotate(2deg); }
      66% { filter: blur(55px) brightness(0.5); transform: scale(1.1) rotate(-2deg); }
    }
    @keyframes luxuryShine {
      0% { transform: translateX(-140%) skewX(-18deg); opacity: 0; }
      20% { opacity: 0.1; }
      50% { opacity: 0.32; }
      100% { transform: translateX(220%) skewX(-18deg); opacity: 0; }
    }
    @keyframes tequilaLoaderFloat {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-8px) scale(1.012); }
    }
    @keyframes tequilaLoaderPulse {
      0%, 100% { opacity: 0.45; transform: scale(1); }
      50% { opacity: 0.82; transform: scale(1.08); }
    }
    @keyframes tequilaGoldSweep {
      0% { background-position: 0% 50%; filter: brightness(0.95); }
      50% { background-position: 100% 50%; filter: brightness(1.14); }
      100% { background-position: 0% 50%; filter: brightness(0.95); }
    }
    @keyframes tequilaSparkleDrift {
      0% { transform: translate3d(0, 14px, 0) scale(0.7); opacity: 0; }
      18% { opacity: 0.9; }
      100% { transform: translate3d(0, -26px, 0) scale(1.08); opacity: 0; }
    }
    @keyframes tequilaLoaderExit {
      0% { opacity: 1; transform: scale(1); filter: blur(0px); }
      100% { opacity: 0; transform: scale(1.035); filter: blur(8px); }
    }
    .luxury-carousel::-webkit-scrollbar { display: none; }
    .luxury-tab::after,
    .luxury-theme-chip::after {
      content: "";
      position: absolute;
      inset: -20% auto -20% -35%;
      width: 38%;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: translateX(-140%) skewX(-18deg);
      opacity: 0;
    }
    .luxury-tab.is-active::after,
    .luxury-tab.is-party::after,
    .luxury-theme-chip::after {
      animation: luxuryShine 3.2s ease-in-out infinite;
    }
    .luxury-tab.is-party {
      box-shadow: 0 8px 22px rgba(255, 122, 0, 0.18), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .boot-loader {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(255, 206, 84, 0.16), transparent 36%),
        radial-gradient(circle at bottom, rgba(255, 145, 0, 0.18), transparent 34%),
        linear-gradient(180deg, #140d07 0%, #090608 52%, #050406 100%);
      transition: opacity 820ms ease, visibility 820ms ease;
      overflow: hidden;
    }
    .boot-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .boot-loader.is-exiting {
      animation: tequilaLoaderExit 900ms cubic-bezier(.22,.8,.24,1) forwards;
    }
    .boot-loader::before,
    .boot-loader::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(26px);
      animation: tequilaLoaderPulse 4.2s ease-in-out infinite;
    }
    .boot-loader::before {
      width: 220px;
      height: 220px;
      background: rgba(255, 193, 7, 0.18);
      top: 10%;
      left: -40px;
    }
    .boot-loader::after {
      width: 260px;
      height: 260px;
      background: rgba(255, 111, 0, 0.16);
      right: -60px;
      bottom: 8%;
      animation-delay: 1.1s;
    }
    .boot-loader-card {
      position: relative;
      width: min(88vw, 430px);
      padding: 20px 18px 26px;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255, 214, 102, 0.18);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      text-align: center;
    }
    .boot-loader-image-wrap {
      position: relative;
      width: min(72vw, 290px);
      margin: 0 auto;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 56px rgba(255, 145, 0, 0.22);
      animation: tequilaLoaderFloat 5s ease-in-out infinite;
    }
    .boot-loader-image-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 38%, rgba(255,193,7,0.08));
      pointer-events: none;
    }
    .boot-loader-image {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }
    .boot-loader-caption {
      margin-top: 18px;
      padding: 0 8px;
      font-size: clamp(16px, 4vw, 24px);
      line-height: 1.28;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #8f5a00 0%, #f4cf68 20%, #fff1b2 36%, #d79d27 52%, #fff7ce 68%, #b87710 84%, #f4cf68 100%);
      background-size: 220% 220%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 22px rgba(255, 202, 40, 0.18);
      animation: tequilaGoldSweep 4.6s linear infinite;
    }
    .boot-loader-caption .spark {
      color: rgba(255, 229, 159, 0.95);
      text-shadow: 0 0 12px rgba(255, 214, 102, 0.4);
    }
    .boot-loader-subline {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(255, 233, 180, 0.54);
    }
    .boot-loader-sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .boot-loader-sparkle {
      position: absolute;
      color: rgba(255, 236, 179, 0.92);
      font-size: 16px;
      text-shadow: 0 0 16px rgba(255, 214, 102, 0.48);
      animation: tequilaSparkleDrift 2.8s ease-in-out infinite;
    }
    .boot-loader-sparkle.s1 { left: 16%; top: 18%; animation-delay: 0s; }
    .boot-loader-sparkle.s2 { right: 18%; top: 22%; animation-delay: .45s; }
    .boot-loader-sparkle.s3 { left: 20%; bottom: 28%; animation-delay: .9s; }
    .boot-loader-sparkle.s4 { right: 22%; bottom: 24%; animation-delay: 1.35s; }
    .boot-loader-sparkle.s5 { left: 49%; top: 10%; animation-delay: 1.8s; }
    .boot-loader-sparkle.s6 { left: 52%; bottom: 12%; animation-delay: 2.2s; }
  </style>
  <script type="module" crossorigin src="/assets/index-DqWCsO6b.js"></script>
</head>
<body>
  <div id="boot-loader" class="boot-loader" aria-hidden="true">
    <div class="boot-loader-card">
      <div class="boot-loader-sparkles">
        <span class="boot-loader-sparkle s1">✦</span>
        <span class="boot-loader-sparkle s2">✦</span>
        <span class="boot-loader-sparkle s3">✦</span>
        <span class="boot-loader-sparkle s4">✦</span>
        <span class="boot-loader-sparkle s5">✦</span>
        <span class="boot-loader-sparkle s6">✦</span>
      </div>
      <div class="boot-loader-image-wrap">
        <img class="boot-loader-image" src="/tequila-loader.png" alt="Luxury loader" />
      </div>
      <div class="boot-loader-caption"><span class="spark">✦</span> Inspired by 𝗧𝗘𝗤𝗨𝗜𝗟𝗔 𝗦𝗨𝗡𝗦𝗛𝗜𝗡𝗘 <span class="spark">✦</span></div>
      <div class="boot-loader-subline">Luxury sound entrance</div>
    </div>
  </div>
  <div id="app"></div>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('[SW] Registered:', reg.scope))
          .catch((err) => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
