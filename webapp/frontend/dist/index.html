<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7c4dff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>BLACK ROOM Player</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }
    button {
      outline: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #eee);
      min-height: 100vh;
      overflow-x: hidden;
    }
    @keyframes meshRotate {
      0%, 100% { filter: blur(60px) brightness(0.5); transform: scale(1.1) rotate(0deg); }
      33% { filter: blur(65px) brightness(0.45); transform: scale(1.15) rotate(2deg); }
      66% { filter: blur(55px) brightness(0.5); transform: scale(1.1) rotate(-2deg); }
    }
    @keyframes luxuryShine {
      0% { transform: translateX(-140%) skewX(-18deg); opacity: 0; }
      20% { opacity: 0.1; }
      50% { opacity: 0.32; }
      100% { transform: translateX(220%) skewX(-18deg); opacity: 0; }
    }
    .luxury-carousel::-webkit-scrollbar { display: none; }
    .luxury-tab::after,
    .luxury-theme-chip::after {
      content: "";
      position: absolute;
      inset: -20% auto -20% -35%;
      width: 38%;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: translateX(-140%) skewX(-18deg);
      opacity: 0;
    }
    .luxury-tab.is-active::after,
    .luxury-tab.is-party::after,
    .luxury-theme-chip::after {
      animation: luxuryShine 3.2s ease-in-out infinite;
    }
    .luxury-tab.is-party {
      box-shadow: 0 8px 22px rgba(255, 122, 0, 0.18), inset 0 1px 0 rgba(255,255,255,0.12);
    }
  </style>
  <script type="module" crossorigin src="/assets/index-acZ5YI2S.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('[SW] Registered:', reg.scope))
          .catch((err) => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
